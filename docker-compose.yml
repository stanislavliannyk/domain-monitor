services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: dm_app
    restart: unless-stopped
    environment:
      APP_ENV: local
    volumes:
      - .:/var/www/html:cached
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    depends_on:
      postgres:
        condition: service_healthy
      setup:
        condition: service_completed_successfully
    networks:
      - dm_network

  nginx:
    image: nginx:1.27-alpine
    container_name: dm_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html:cached
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - dm_network

  postgres:
    image: postgres:16-alpine
    container_name: dm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       domain_monitor
      POSTGRES_USER:     domain_monitor
      POSTGRES_PASSWORD: secret
    volumes:
      - dm_postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_EXTERNAL_PORT:-54320}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U domain_monitor -d domain_monitor"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - dm_network

  setup:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: dm_setup
    restart: "no"
    volumes:
      - .:/var/www/html:cached
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
        composer install --no-interaction --no-progress --prefer-dist --optimize-autoloader &&

        if [ ! -f .env ]; then
          cp .env.example .env
          echo 'Создан .env из .env.example'
        fi &&

        if ! grep -q '^APP_KEY=.\+' .env; then
          php artisan key:generate --ansi
          echo 'APP_KEY сгенерирован'
        else
          echo 'APP_KEY уже задан'
        fi &&

        php artisan migrate --force --ansi &&
        echo 'Инициализация завершена'
      "
    networks:
      - dm_network

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: dm_queue
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www/html:cached
    depends_on:
      postgres:
        condition: service_healthy
      setup:
        condition: service_completed_successfully
    networks:
      - dm_network

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: dm_scheduler
    restart: unless-stopped
    command: >
      sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    volumes:
      - .:/var/www/html:cached
    depends_on:
      postgres:
        condition: service_healthy
      setup:
        condition: service_completed_successfully
    networks:
      - dm_network

  mailpit:
    image: axllent/mailpit:latest
    container_name: dm_mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_UI_PORT:-8025}:8025"
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
    networks:
      - dm_network

volumes:
  dm_postgres_data:

networks:
  dm_network:
    driver: bridge
