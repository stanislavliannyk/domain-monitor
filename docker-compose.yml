services:

  # ── PHP-FPM (app) ───────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: dm_app
    restart: unless-stopped
    environment:
      APP_ENV: local
    volumes:
      - .:/var/www/html:cached
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - dm_network

  # ── Nginx ────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: dm_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html:cached
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - dm_network

  # ── MySQL 8 ──────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.3
    container_name: dm_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE:      domain_monitor
      MYSQL_USER:          domain_monitor
      MYSQL_PASSWORD:      secret
      MYSQL_ROOT_PASSWORD: root_secret
    volumes:
      - dm_mysql_data:/var/lib/mysql
    ports:
      - "${DB_EXTERNAL_PORT:-33060}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "domain_monitor", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - dm_network

  # ── Queue worker ─────────────────────────────────────────────────────────────
  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: dm_queue
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www/html:cached
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - dm_network

  # ── Scheduler ────────────────────────────────────────────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: dm_scheduler
    restart: unless-stopped
    command: >
      sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    volumes:
      - .:/var/www/html:cached
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - dm_network

  # ── Mailpit (локальный SMTP + веб-интерфейс для просмотра писем) ─────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: dm_mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_UI_PORT:-8025}:8025"    # Веб-интерфейс
      - "${MAILPIT_SMTP_PORT:-1025}:1025"  # SMTP
    networks:
      - dm_network

volumes:
  dm_mysql_data:

networks:
  dm_network:
    driver: bridge
